<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law Voting Stats — 3d Party</title>
    <link rel="stylesheet" href="/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0PED1M435Y"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-0PED1M435Y');
    </script>
    <script src="/js/auth.js"></script>
    <script src="nav.js"></script>
</head>
<body class="bg-party-dark text-white min-h-screen">

    <div class="max-w-4xl mx-auto px-4 py-8">
        
        <!-- Header -->
        <div class="bg-party-card rounded-xl p-6 mb-8 border border-gray-700">
            <h1 class="text-2xl font-bold text-party-accent mb-2">Law Voting Statistics</h1>
            <p class="text-gray-400">Track votes across laws, articles, clauses, and community proposals.</p>
        </div>

        <!-- Overall Stats -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
            <div class="bg-party-card rounded-xl p-4 border border-gray-700 text-center">
                <div class="text-3xl font-bold text-party-accent" id="totalVotes">—</div>
                <div class="text-gray-500 text-sm">Total Votes</div>
            </div>
            <div class="bg-party-card rounded-xl p-4 border border-gray-700 text-center">
                <div class="text-3xl font-bold text-purple-400" id="lawVotes">—</div>
                <div class="text-gray-500 text-sm">Law Votes</div>
            </div>
            <div class="bg-party-card rounded-xl p-4 border border-gray-700 text-center">
                <div class="text-3xl font-bold text-green-400" id="proposalVotes">—</div>
                <div class="text-gray-500 text-sm">Proposal Votes</div>
            </div>
            <div class="bg-party-card rounded-xl p-4 border border-gray-700 text-center">
                <div class="text-3xl font-bold text-blue-400" id="rankedVotes">—</div>
                <div class="text-gray-500 text-sm">Ranked Votes</div>
            </div>
            <div class="bg-party-card rounded-xl p-4 border border-gray-700 text-center">
                <div class="text-3xl font-bold text-yellow-400" id="articlesVoted">—</div>
                <div class="text-gray-500 text-sm">Articles Voted</div>
            </div>
        </div>

        <!-- Active Proposals -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-party-card rounded-xl p-4 border border-gray-700 text-center">
                <div class="text-2xl font-bold text-party-secondary" id="activeProposals">—</div>
                <div class="text-gray-500 text-sm">Active Proposals</div>
            </div>
            <div class="bg-party-card rounded-xl p-4 border border-gray-700 text-center">
                <div class="text-2xl font-bold text-orange-400" id="activeRanked">—</div>
                <div class="text-gray-500 text-sm">Active Ranked</div>
            </div>
        </div>

        <!-- Top Voted -->
        <div class="bg-party-card rounded-xl p-6 mb-8 border border-gray-700">
            <h2 class="text-xl font-bold mb-4"><i class="fas fa-fire text-party-accent mr-2"></i>Most Voted</h2>
            <div id="topArticles" class="space-y-3">
                <div class="text-center py-4 text-gray-500">
                    <i class="fas fa-spinner fa-spin mr-2"></i> Loading...
                </div>
            </div>
        </div>

        <!-- Recent Votes -->
        <div class="bg-party-card rounded-xl p-6 border border-gray-700">
            <h2 class="text-xl font-bold mb-4"><i class="fas fa-clock text-party-accent mr-2"></i>Recent Votes</h2>
            <div id="recentVotes" class="space-y-3">
                <div class="text-center py-4 text-gray-500">
                    <i class="fas fa-spinner fa-spin mr-2"></i> Loading...
                </div>
            </div>
        </div>

    </div>

    <script>
        async function loadStats() {
            try {
                const res = await fetch('/api/mvlaws/stats');
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('totalVotes').textContent = data.totalVotes;
                    document.getElementById('lawVotes').textContent = data.lawVotes;
                    document.getElementById('proposalVotes').textContent = data.proposalVotes;
                    document.getElementById('rankedVotes').textContent = data.rankedVotes;
                    document.getElementById('articlesVoted').textContent = data.articlesVoted;
                    document.getElementById('activeProposals').textContent = data.activeProposals;
                    document.getElementById('activeRanked').textContent = data.activeRanked;
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        async function loadTopArticles() {
            try {
                const res = await fetch('/api/mvlaws/top-voted');
                const data = await res.json();
                
                if (data.success && data.articles.length > 0) {
                    document.getElementById('topArticles').innerHTML = data.articles.map(a => {
                        const isProposal = a.vote_source === 'proposal';
                        const sourceBadge = isProposal 
                            ? '<span class="text-xs bg-green-900/40 text-green-300 px-2 py-0.5 rounded">Proposal</span>'
                            : `<span class="text-xs bg-purple-900/40 text-purple-300 px-2 py-0.5 rounded">Article ${a.article_number || ''}</span>`;
                        
                        return `
                        <div class="flex justify-between items-center bg-gray-800/50 rounded-lg p-3">
                            <div>
                                <div class="font-bold text-party-accent">${escapeHtml(a.law_name || 'Unknown')}</div>
                                <div class="text-gray-400 text-sm">${sourceBadge} ${escapeHtml(a.article_title || '')}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-green-400 text-sm">+${a.support || 0}</div>
                                <div class="text-red-400 text-sm">-${a.oppose || 0}</div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    document.getElementById('topArticles').innerHTML = '<div class="text-gray-500 text-center py-4">No votes yet</div>';
                }
            } catch (e) {
                document.getElementById('topArticles').innerHTML = '<div class="text-gray-500 text-center py-4">Could not load data</div>';
            }
        }
        
        async function loadRecentVotes() {
            try {
                const res = await fetch('/api/mvlaws/recent-votes');
                const data = await res.json();
                
                if (data.success && data.votes.length > 0) {
                    document.getElementById('recentVotes').innerHTML = data.votes.map(v => {
                        const sourceBadge = v.vote_source === 'proposal'
                            ? '<span class="text-xs bg-green-900/40 text-green-300 px-2 py-0.5 rounded">Proposal</span>'
                            : v.vote_source === 'ranked'
                            ? '<span class="text-xs bg-orange-900/40 text-orange-300 px-2 py-0.5 rounded">Ranked</span>'
                            : `<span class="text-xs bg-purple-900/40 text-purple-300 px-2 py-0.5 rounded">Art. ${v.article_number || ''}</span>`;
                        
                        const voteLabel = v.vote === 'support' || v.vote === 'yes' ? 'Support' 
                            : v.vote === 'oppose' || v.vote === 'no' ? 'Oppose' 
                            : v.vote === 'ranked' ? 'Ranked'
                            : 'Abstain';
                        const voteClass = v.vote === 'support' || v.vote === 'yes' ? 'text-green-400' 
                            : v.vote === 'oppose' || v.vote === 'no' ? 'text-red-400' 
                            : v.vote === 'ranked' ? 'text-orange-400'
                            : 'text-gray-400';
                        
                        return `
                        <div class="flex justify-between items-center bg-gray-800/50 rounded-lg p-3">
                            <div>
                                <div class="font-bold text-party-accent">${escapeHtml(v.law_name || 'Unknown')}</div>
                                <div class="text-gray-400 text-sm">${sourceBadge} ${escapeHtml(v.article_title || '')}</div>
                            </div>
                            <div class="text-right">
                                <div class="${voteClass} font-bold">${voteLabel}</div>
                                <div class="text-gray-500 text-xs">${formatTime(v.voted_at)}</div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    document.getElementById('recentVotes').innerHTML = '<div class="text-gray-500 text-center py-4">No votes yet. Be the first to vote!</div>';
                }
            } catch (e) {
                document.getElementById('recentVotes').innerHTML = '<div class="text-gray-500 text-center py-4">Could not load data</div>';
            }
        }
        
        function formatTime(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
            if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
            return Math.floor(diff / 86400000) + 'd ago';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadStats();
        loadTopArticles();
        loadRecentVotes();
        
        setInterval(() => {
            loadStats();
            loadTopArticles();
            loadRecentVotes();
        }, 30000);
    </script>
</body>
</html>
